<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受注顧客管理ファイル｜ログイン制限付き ｜MOBILE REALTIME LEDGER v14</title>
  <style>
    :root {
      --bg: #eef3f9;
      --paper: #ffffff;
      --ink: #122033;
      --muted: #6b7280;
      --line: #d7dee8;
      --line-dark: #8b98aa;
      --navy: #111f3d;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --cyan-soft: #e0f7ff;
      --green: #047857;
      --green-soft: #dcfce7;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --purple: #7c3aed;
      --purple-soft: #ede9fe;
      --shadow: 0 22px 60px rgba(15, 23, 42, .12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow-x: hidden;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(37, 99, 235, .17), transparent 32%),
        radial-gradient(circle at 90% 10%, rgba(124, 58, 237, .11), transparent 30%),
        linear-gradient(135deg, #f8fafc 0%, #e7eef8 100%);
    }

    .app {
      max-width: 1640px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 3vw, 40px);
      letter-spacing: .04em;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.82);
      color: #1e3a8a;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(37, 99, 235, .10);
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
    }

    .metric,
    .chart-card,
    .control-panel,
    .workbook {
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(255,255,255,.98);
      box-shadow: 0 18px 46px rgba(15, 23, 42, .09);
      backdrop-filter: blur(14px);
    }

    .metric {
      border-radius: 19px;
      padding: 14px 15px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      right: -28px;
      top: -28px;
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: rgba(37, 99, 235, .09);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .metric strong {
      font-size: clamp(20px, 2vw, 26px);
      letter-spacing: .01em;
      position: relative;
      z-index: 1;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .chart-card {
      border-radius: 20px;
      padding: 13px;
      min-height: 190px;
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 900;
      color: #1f2937;
    }

    .chart-note {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    canvas {
      width: 100%;
      height: 142px;
      display: block;
    }

    .control-panel {
      display: grid;
      grid-template-columns: 260px minmax(320px, 1fr) 160px auto auto auto auto;
      gap: 10px;
      align-items: center;
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 14px;
      position: sticky;
      top: 8px;
      z-index: 50;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      outline: none;
      transition: .16s ease;
      font-family: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #475569 50%),
        linear-gradient(135deg, #475569 50%, transparent 50%);
      background-position: calc(100% - 16px) 50%, calc(100% - 11px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 28px;
    }

    button {
      border: 0;
      border-radius: 12px;
      min-height: 40px;
      padding: 9px 13px;
      font-weight: 900;
      cursor: pointer;
      transition: .16s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary { color: #fff; background: var(--blue); }
    .btn-ghost { color: #111827; background: #e7ebf1; }
    .btn-danger { color: var(--red); background: var(--red-soft); }
    .btn-small { min-height: 30px; padding: 6px 9px; border-radius: 9px; font-size: 12px; }
    .btn-note { background: var(--purple-soft); color: var(--purple); }

    .workbook {
      border-radius: 24px;
      overflow: hidden;
      border-color: #e5e7eb;
    }

    .sheet-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #f8fafc, #eff6ff);
      border-bottom: 1px solid #dbe3ef;
    }

    .sheet-tab {
      background: #fff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
      border-bottom: 3px solid var(--blue);
      border-radius: 12px 12px 8px 8px;
      padding: 9px 16px;
      font-weight: 900;
      font-size: 13px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .08);
      max-width: 48vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .save-state {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .sheet-scroll {
      overflow: auto;
      padding: 18px;
      background: #f8fafc;
    }

    .sheet-layout {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
    }

    .sheet-main {
      background: #fff;
      border: 1px solid #d9e2ee;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .08);
      padding: 14px;
      border-radius: 18px;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #111f3d;
      color: #fff;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 900;
      margin: 0 0 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 118px 1fr 118px 1fr 118px 1fr;
      border-top: 1px solid var(--line-dark);
      border-left: 1px solid var(--line-dark);
      margin-bottom: 13px;
    }

    .cell {
      border-right: 1px solid var(--line-dark);
      border-bottom: 1px solid var(--line-dark);
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 5px;
      background: #fff;
    }

    .label-cell {
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe);
      color: #17325e;
      font-weight: 900;
      font-size: 12px;
    }

    .blank-cell { background: #f8fafc; }

    .items-wrap,
    .purchase-wrap {
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
    }

    th,
    td {
      border: 1px solid var(--line-dark);
      padding: 5px;
      min-height: 34px;
      font-size: 12px;
      vertical-align: middle;
    }

    th {
      background: linear-gradient(135deg, #fde68a, #fbbf24);
      color: #2b1c00;
      text-align: center;
      font-weight: 900;
      line-height: 1.25;
    }

    .items-table td { background: #fff; }

    .table-input,
    .excel-input {
      min-height: 30px;
      height: 30px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 4px 7px;
      background: #ffffff;
      font-size: 12px;
    }

    .table-input:hover,
    .excel-input:hover {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .right { text-align: right; }
    .center { text-align: center; }

    .readonly-cell {
      min-height: 30px;
      background: #f8fafc !important;
      color: #111827;
      font-weight: 800;
    }

    .total-row {
      display: grid;
      grid-template-columns: 1fr 190px;
      max-width: 650px;
      margin-left: auto;
      margin-top: 0;
    }

    .total-label {
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      border: 1px solid var(--line-dark);
      border-right: 0;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      color: #3b0764;
    }

    .total-value {
      border: 1px solid var(--line-dark);
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 9px;
      font-weight: 900;
      background: #fff;
    }

    .purchase-table {
      max-width: 920px;
    }

    .purchase-table th {
      background: linear-gradient(135deg, #bbf7d0, #86efac);
      color: #064e3b;
    }

    .gross-head {
      background: linear-gradient(135deg, #fef08a, #facc15) !important;
      border: 2px solid #334155 !important;
    }

    .gross-value {
      border: 2px solid #334155 !important;
      font-weight: 900;
      color: #713f12;
      background: #fffbeb !important;
    }

    .cash-fixed {
      background: #f1f5f9 !important;
      color: #475569 !important;
      font-weight: 900;
      text-align: center;
    }

    .manual-base {
      background: #fff7ed !important;
      border-color: #fdba74 !important;
      font-weight: 900;
    }

    .note-cell {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 6px;
    }

    .note-preview {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #4b5563;
      font-size: 12px;
      min-width: 0;
    }

    .master-panel {
      display: none !important;
    }

    .master-section { margin-bottom: 12px; }
    .master-title {
      background: #111f3d;
      color: #fff;
      border-radius: 12px 12px 0 0;
      font-weight: 900;
      padding: 7px 9px;
      font-size: 12px;
    }
    .master-item {
      border-left: 1px solid #cbd5e1;
      border-right: 1px solid #cbd5e1;
      border-bottom: 1px solid #cbd5e1;
      min-height: 27px;
      padding: 6px 8px;
      font-size: 12px;
      background: #fff;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 13px;
      flex-wrap: wrap;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.75;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed #94a3b8;
      border-radius: 18px;
      padding: 36px;
      text-align: center;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 18px;
    }

    .modal.open { display: flex; }

    .modal-card {
      width: min(620px, 96vw);
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, .28);
      overflow: hidden;
    }

    .modal-head {
      padding: 16px 18px;
      background: linear-gradient(135deg, #111f3d, #1e3a8a);
      color: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .modal-head strong { font-size: 16px; }
    .modal-body { padding: 18px; }
    .modal-body textarea { min-height: 180px; resize: vertical; }
    .modal-actions { padding: 0 18px 18px; display: flex; justify-content: flex-end; gap: 10px; }

    @media (max-width: 1260px) {
      .dashboard { grid-template-columns: 1fr; }
      .control-panel { grid-template-columns: 1fr 1fr; position: static; }
    }

    @media (max-width: 760px) {
      .app { padding: 14px 10px 30px; }
      .metrics, .chart-grid, .control-panel { grid-template-columns: 1fr; }
      .sheet-scroll { padding: 10px; }
      .sheet-tab { max-width: 80vw; }
    }

    @media print {
      body { background: #fff; }
      .hero, .dashboard, .control-panel, .footer-actions, .save-state, .master-panel, .delete-row { display: none !important; }
      .app { max-width: 100%; padding: 0; }
      .workbook { box-shadow: none; border: 0; border-radius: 0; }
      .sheet-scroll { overflow: visible; padding: 0; }
      .sheet-layout { min-width: 0; grid-template-columns: 1fr; }
      .sheet-main { box-shadow: none; border-radius: 0; }
    }
  
    /* v4: 画面内フィット調整 */
    .app-shell,
    .sheet-frame,
    .sheet-main,
    #sheetArea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    .sheet-frame {
      padding-left: 16px;
      padding-right: 16px;
      overflow-x: hidden;
    }

    .sheet-main {
      padding: 14px;
      border-radius: 16px;
      overflow-x: hidden;
    }

    table {
      width: 100% !important;
      min-width: 0 !important;
      table-layout: fixed;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 6px 7px !important;
      font-size: 11px !important;
      line-height: 1.35;
      word-break: break-word;
      white-space: normal;
    }

    input,
    select,
    textarea {
      max-width: 100%;
      min-width: 0;
      font-size: 11px !important;
      padding: 5px 6px !important;
      height: 28px;
    }

    .info-grid {
      width: 100%;
      min-width: 0 !important;
      table-layout: fixed;
    }

    .items-table,
    .purchase-table {
      width: 100%;
      min-width: 0 !important;
      table-layout: fixed;
    }

    .section-title {
      margin: 10px 0 6px !important;
      padding: 6px 10px !important;
      font-size: 12px !important;
    }

    .table-wrap,
    .scroll-wrap,
    .sheet-scroll {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden !important;
    }

    .footer-actions {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .note {
      font-size: 10px !important;
      line-height: 1.5;
      max-width: 560px;
    }

    .btn-primary,
    .btn-ghost,
    .btn-danger {
      padding: 8px 10px !important;
      font-size: 11px !important;
      border-radius: 9px !important;
    }

    /* 明細表の列幅を圧縮。横スライダーを出さず、1画面に収める */
    .items-table th:nth-child(1), .items-table td:nth-child(1) { width: 6%; }
    .items-table th:nth-child(2), .items-table td:nth-child(2) { width: 9%; }
    .items-table th:nth-child(3), .items-table td:nth-child(3) { width: 9%; }
    .items-table th:nth-child(4), .items-table td:nth-child(4) { width: 8%; }
    .items-table th:nth-child(5), .items-table td:nth-child(5) { width: 13%; }
    .items-table th:nth-child(6), .items-table td:nth-child(6) { width: 4.5%; }
    .items-table th:nth-child(7), .items-table td:nth-child(7) { width: 8%; }
    .items-table th:nth-child(8), .items-table td:nth-child(8) { width: 9%; }
    .items-table th:nth-child(9), .items-table td:nth-child(9) { width: 9%; }
    .items-table th:nth-child(10), .items-table td:nth-child(10) { width: 7%; }
    .items-table th:nth-child(11), .items-table td:nth-child(11) { width: 5%; }
    .items-table th:nth-child(12), .items-table td:nth-child(12) { width: 8%; }
    .items-table th:nth-child(13), .items-table td:nth-child(13) { width: 4.5%; }

    .purchase-table th,
    .purchase-table td {
      width: auto;
    }

    .summary-row td {
      font-size: 12px !important;
      padding: 7px !important;
    }

    @media (max-width: 1200px) {
      .sheet-frame {
        padding-left: 10px;
        padding-right: 10px;
      }

      .sheet-main {
        padding: 10px;
      }

      th,
      td {
        padding: 5px 4px !important;
        font-size: 10px !important;
      }

      input,
      select,
      textarea {
        font-size: 10px !important;
        padding: 4px 5px !important;
      }

      .note {
        display: none;
      }
    }

    @media (max-width: 900px) {
      .sheet-main {
        transform-origin: top left;
      }

      th,
      td {
        font-size: 9px !important;
      }
    }

  
    /* v6: FUTURE LEDGER 近未来デザイン */
    :root {
      --bg: #050816;
      --paper: rgba(9, 18, 39, .86);
      --ink: #eaf6ff;
      --muted: #92a7c2;
      --line: rgba(125, 211, 252, .26);
      --line-dark: rgba(56, 189, 248, .42);
      --navy: #081124;
      --blue: #22d3ee;
      --blue-soft: rgba(34, 211, 238, .16);
      --cyan-soft: rgba(103, 232, 249, .14);
      --green: #4ade80;
      --green-soft: rgba(74, 222, 128, .15);
      --amber: #fbbf24;
      --amber-soft: rgba(251, 191, 36, .14);
      --red: #fb7185;
      --red-soft: rgba(251, 113, 133, .14);
      --purple: #a78bfa;
      --purple-soft: rgba(167, 139, 250, .16);
      --shadow: 0 24px 80px rgba(0, 0, 0, .44);
      --radius: 24px;
      --glow-cyan: 0 0 18px rgba(34, 211, 238, .35), 0 0 42px rgba(59, 130, 246, .18);
      --glow-violet: 0 0 18px rgba(167, 139, 250, .28), 0 0 52px rgba(34, 211, 238, .14);
    }

    body {
      color: var(--ink);
      background:
        linear-gradient(rgba(125, 211, 252, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(125, 211, 252, .035) 1px, transparent 1px),
        radial-gradient(circle at 8% 4%, rgba(34, 211, 238, .22), transparent 28%),
        radial-gradient(circle at 92% 12%, rgba(167, 139, 250, .23), transparent 28%),
        radial-gradient(circle at 50% 98%, rgba(14, 165, 233, .16), transparent 38%),
        linear-gradient(135deg, #030712 0%, #08111f 48%, #0b1026 100%);
      background-size:
        34px 34px,
        34px 34px,
        auto,
        auto,
        auto,
        auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0%, rgba(34, 211, 238, .055) 42%, transparent 47%),
        radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, .26) 100%);
      mix-blend-mode: screen;
      opacity: .9;
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.025) 0,
        rgba(255,255,255,.025) 1px,
        transparent 1px,
        transparent 5px
      );
      opacity: .18;
      z-index: 9999;
    }

    .app {
      max-width: 1660px;
    }

    .hero {
      padding: 10px 4px 4px;
    }

    h1 {
      color: #f8fbff;
      letter-spacing: .08em;
      text-shadow: 0 0 22px rgba(34, 211, 238, .26);
      position: relative;
    }

    h1::after {
      content: "ORDER CUSTOMER MASTER";
      display: block;
      margin-top: 5px;
      font-size: 10px;
      letter-spacing: .34em;
      color: rgba(125, 211, 252, .75);
      font-weight: 800;
    }

    .subtitle {
      color: var(--muted);
    }

    .pill {
      background: linear-gradient(135deg, rgba(8, 16, 38, .82), rgba(16, 35, 67, .72));
      color: #dff9ff;
      border: 1px solid rgba(125, 211, 252, .45);
      box-shadow: var(--glow-cyan), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter: blur(18px);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .dashboard,
    .control-panel,
    .workbook,

    .dashboard,

      position: relative;
      overflow: hidden;

    .dashboard::before,
    .workbook::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(34, 211, 238, .09), transparent);
      transform: translateX(-100%);
      animation: ledgerSweep 6s linear infinite;

    @keyframes ledgerSweep {
      0% { transform: translateX(-120%); opacity: 0; }
      12% { opacity: .8; }
      34% { opacity: .2; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    /* v7: 備考・操作列まで1画面に完全表示する列幅調整 */
    .items-wrap {
      width: 100%;

    .items-table th {

      clearTimeout(pendingRemoteTimer);

        if (!pendingRemotePayload) return;

        const payload = pendingRemotePayload;
        pendingRemotePayload = null;
        applyRemoteRecords(payload.records, new Set(payload.ids), payload.selectedId);

      applyingRemote = true;

      const nextIndex = selectedId ? records.findIndex(r => r.id === selectedId) : currentIndex;
      currentIndex = Math.max(0, nextIndex >= 0 ? nextIndex : Math.min(currentIndex, records.length - 1));

      try {

          console.warn("Auth persistence warning:", error);

            cloudReady = false;
            cloudStarted = false;
            lockApp("");

            lockApp("このメールアドレスは許可されていません。管理者に確認してください。");
            return;

          unlockApp(user);

            cloudStarted = true;

      if (["クレディ", "クレディセゾン"].includes(v)) return "クレディセゾン";
      if (["シャープファイナンス", "シャープ"].includes(v)) return "シャープ";
      if (["BPリース", "BP"].includes(v)) return "BP";
      if (["現金購入", "現金販売", "現金"].includes(v)) return "現金販売";
      return v ? "アプラス" : "";
    }

    function normalizeProgress(value) {
      const v = String(value || "").trim();
      if (OPTIONS.progress.includes(v)) return v;
      if (/検収\s*OK|検収ＯＫ/.test(v)) return "工事完了（検収OK）";
      if (/検収待ち/.test(v)) return "工事完了（検収待ち）";
      if (/工事待ち/.test(v)) return "与信OK（納品済み工事待ち）";
      if (/発注済|納期|納品待ち/.test(v)) return "与信OK（発注済み納品待ち）";
      if (/与信|承認|発注待ち/.test(v)) return "与信OK（発注待ち）";
      if (/書類不備/.test(v)) return "書類不備";
      return v ? "与信待ち" : "与信待ち";
    }

    function normalizeType(value) {
      const v = String(value || "").trim();
      if (OPTIONS.types.includes(v)) return v;
      if (/工事|外注/.test(v)) return "外注費";
      if (/部材/.test(v)) return "部材費";
      if (/紹介|応援/.test(v)) return "応援費";
      if (/返金/.test(v)) return "返金";
      return v ? "サービス品" : "";
    }

    function normalizeDelivery(value) {
      const v = String(value || "").trim();
      if (v === "済" || /OK|ＯＫ|完了/.test(v)) return "済";
      if (v === "未" || v === "") return v || "未";
      return "未";
    }

    function normalizePurchase(p) {
      p.method = normalizePurchaseMethod(p.method);
      p.company = normalizeLeaseCompany(p.company);
      p.times = normalizeTimes(p.times);
      if (p.method === "現金販売") {
        p.company = "現金販売";
        p.rate = "-";
        p.times = "-";
        p.baseAmount = num(p.baseAmount || p.monthly || 0);
      }
      return p;
    }

    function normalizePurchaseMethod(value) {
      const v = String(value || "").trim();
      if (v === "現金販売" || v === "現金購入" || v === "現金振り込み") return "現金販売";
      return "リース";
    }

    function normalizeTimes(value) {
      const v = String(value || "").trim();
      if (!v) return "";
      if (v === "-") return "-";
      const n = v.replace("回", "");
      return OPTIONS.times.includes(`${n}回`) ? `${n}回` : v;
    }

    function normalizeDate(value) {
      const raw = String(value || "").trim();
      if (!raw || raw === "-" || raw === "未") return "";

      const cleaned = raw
        .replace(/[年月]/g, "/")
        .replace(/日/g, "")
        .replace(/[.．]/g, "/")
        .replace(/\s+/g, "")
        .replace(/－/g, "-");

      function toIso(year, month, day) {
        const y = Number(year);
        const m = Number(month);
        const d = Number(day);
        if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return "";
        if (y < 1900 || y > 2100 || m < 1 || m > 12 || d < 1 || d > 31) return "";
        const test = new Date(y, m - 1, d);
        if (test.getFullYear() !== y || test.getMonth() !== m - 1 || test.getDate() !== d) return "";
        return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      }

      let m = cleaned.match(/^((?:19|20)\d{2})[\/-](\d{1,2})[\/-](\d{1,2})/);
      if (m) return toIso(m[1], m[2], m[3]);

      m = cleaned.match(/^(?:H|h|平成)(\d{1,2})[\/-](\d{1,2})[\/-](\d{1,2})$/);
      if (m) return toIso(1988 + Number(m[1]), m[2], m[3]);

      m = cleaned.match(/^(?:S|s|昭和)(\d{1,2})[\/-](\d{1,2})[\/-](\d{1,2})$/);
      if (m) return toIso(1925 + Number(m[1]), m[2], m[3]);

      m = cleaned.match(/^(?:R|r|令和)(\d{1,2})[\/-](\d{1,2})[\/-](\d{1,2})$/);
      if (m) return toIso(2018 + Number(m[1]), m[2], m[3]);

      if (/^((?:19|20)\d{2})-\d{2}-\d{2}$/.test(cleaned)) return cleaned;
      return "";
    }

    function saveRecords() {
      if (!applyingRemote) noteLocalEdit();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      setSaveState((cloudReady ? "同期待ち " : "端末内保存 ") + new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }));

      if (cloudReady && !applyingRemote) {
        queueCloudSave();
      }
    }

    function queueCloudSave() {
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(saveAllRecordsToCloud, 700);
    }

    async function saveAllRecordsToCloud() {
      if (!cloudReady || !db || applyingRemote) return;

      try {
        setSaveState("クラウド同期中…");

        const batch = db.batch();
        const currentIds = new Set();

        records.forEach((record, index) => {
          record.id = record.id || `rec_${Date.now()}_${index}`;
          record.sortIndex = index;
          record.updatedAt = new Date().toISOString();
          currentIds.add(record.id);

          const ref = db.collection(FIRESTORE_COLLECTION).doc(record.id);
          batch.set(ref, {
            ...record,
            sortIndex: index,
            updatedAtClient: record.updatedAt,
            updatedAtServer: firebase.firestore.FieldValue.serverTimestamp()
          });
        });

        cloudKnownIds.forEach(id => {
          if (!currentIds.has(id)) {
            batch.delete(db.collection(FIRESTORE_COLLECTION).doc(id));
          }
        });

        await batch.commit();
        cloudKnownIds = currentIds;
        lastRenderedSignature = stableRecordsSignature(records);
        localEditUntil = Date.now() + 1200;
        setSaveState("同期済み " + new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }));
      } catch (error) {
        console.error("Firestore save error:", error);
        setSaveState("同期エラー / 端末内保存");
      }
    }

    async function seedCloudIfEmpty() {
      if (!cloudReady || !db || !records.length) return;
      await saveAllRecordsToCloud();
    }

    function initCloudSync() {
      if (!currentUser) {
        setSaveState("未ログイン");
        return;
      }
      if (!firebaseConfigured()) {
        setSaveState("端末内保存 / Firebase未設定");
        return;
      }

      if (typeof firebase === "undefined" || !firebase.firestore) {
        setSaveState("端末内保存 / Firebase読込不可");
        return;
      }

      try {
        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();

        db.enablePersistence({ synchronizeTabs: true }).catch(error => {
          console.warn("Firestore persistence warning:", error);
        });

        cloudReady = true;
        setSaveState("クラウド接続中…");

        unsubscribeCloud = db.collection(FIRESTORE_COLLECTION).onSnapshot(async snapshot => {
          if (snapshot.empty) {
            cloudKnownIds = new Set();
            await seedCloudIfEmpty();
            return;
          }

          const selectedId = currentRecord()?.id;
          const remoteRecords = [];
          const ids = new Set();

          snapshot.forEach(doc => {
            const data = doc.data() || {};
            ids.add(doc.id);
            remoteRecords.push({ ...data, id: data.id || doc.id });
          });

          remoteRecords.sort((a, b) => num(a.sortIndex) - num(b.sortIndex));

          const normalized = normalizeRecords(remoteRecords);
          const signature = stableRecordsSignature(normalized);

          if (signature === lastRenderedSignature) {
            setSaveState("同期済み " + new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }));
            return;
          }

          if (isEditingNow()) {
            pendingRemotePayload = { records: normalized, ids: Array.from(ids), selectedId };
            schedulePendingRemote();
            setSaveState("入力中・同期保留 " + new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }));
            return;
          }

          applyRemoteRecords(normalized, ids, selectedId);
        }, error => {
          console.error("Firestore listen error:", error);
          setSaveState("同期エラー / 端末内保存");
        });
      } catch (error) {
        console.error("Firebase init error:", error);
        setSaveState("端末内保存 / Firebase初期化エラー");
      }
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function num(value) {
      if (value === null || value === undefined || value === "" || value === "-") return 0;
      const cleaned = String(value).replaceAll(",", "").replace(/[￥¥\s]/g, "");
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function roundDown100(value) {
      const n = num(value);
      return Math.trunc(n / 100) * 100;
    }

    function yen(value) {
      const n = num(value);
      return n.toLocaleString("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 });
    }

    function plainNumber(value) {
      if (value === "" || value === null || value === undefined || value === "-") return String(value || "");
      const n = num(value);
      return n.toLocaleString("ja-JP");
    }

    function optionList(options, selected, includeBlank = true) {

      return blank + options.map(value => `<option value="${esc(value)}" ${String(value) === String(selected) ? "selected" : ""}>${esc(value)}</option>`).join("");
    }

    function currentRecord() { return records[currentIndex] || records[0]; }

    function calcItemTotal(record) {
      return (record.items || []).reduce((sum, item) => sum + (num(item.qty) * num(item.unitCost)), 0);
    }

    function isCashSale(record) {
      return (record.purchase || {}).method === "現金販売";
    }

    function calcBaseAmount(record) {
      const p = record.purchase || {};
      if (p.method === "現金販売") return num(p.baseAmount);
      const monthly = num(p.monthly);
      const rate = num(p.rate);
      if (monthly && rate) return roundDown100(monthly / (rate / 100));
      return num(p.baseAmount);
    }

    function calcGross(record) {
      return roundDown100(calcBaseAmount(record) - calcItemTotal(record));
    }

    function tableInput(index, field, value, kind, options, extraClass = "") {

    function drawBarChart(canvasId, labels, values, formatter) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const padL = 48, padR = 14, padT = 14, padB = 28;
      const areaW = w - padL - padR;
      const areaH = h - padT - padB;
      const max = Math.max(...values.map(v => Math.abs(v)), 1);
      ctx.strokeStyle = "rgba(37, 99, 235, .16)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 3; i++) {
        const y = padT + (areaH / 3) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
      }
      ctx.fillStyle = "rgba(71, 85, 105, .90)";
      ctx.font = "11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(formatter(max), padL - 6, padT + 4);
      ctx.fillText("0", padL - 6, padT + areaH + 3);
      if (!labels.length) {
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(100, 116, 139, .90)";
        ctx.fillText("集計できる日付データがありません", w / 2, h / 2);
        return;
      }
      const gap = 7;
      const barW = Math.max(8, (areaW - gap * (labels.length - 1)) / labels.length);
      values.forEach((value, i) => {
        const x = padL + i * (barW + gap);
        const barH = Math.max(1, Math.abs(value) / max * areaH);
        const y = padT + areaH - barH;
        const grad = ctx.createLinearGradient(0, y, 0, padT + areaH);
        grad.addColorStop(0, value >= 0 ? "#2563eb" : "#dc2626");
        grad.addColorStop(1, value >= 0 ? "#93c5fd" : "#fecaca");
        ctx.fillStyle = grad;
        roundedRect(ctx, x, y, barW, barH, 6);
        ctx.fill();
        ctx.save();
        ctx.translate(x + barW / 2, h - 8);
        ctx.rotate(labels.length > 8 ? -0.45 : 0);
        ctx.fillStyle = "rgba(30, 41, 59, .88)";
        ctx.textAlign = labels.length > 8 ? "right" : "center";
        ctx.fillText(labels[i], 0, 0);
        ctx.restore();
      });
    }

    function roundedRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + w - rr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
      ctx.lineTo(x + w, y + h - rr);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
      ctx.lineTo(x + rr, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
    }

    function renderCharts() {
      const basis = document.getElementById("basisDate")?.value || "applicationDate";
      const monthly = new Map();
      const yearly = new Map();
      records.forEach(record => {
        const date = normalizeDate(record.fields[basis]);
        if (!date) return;
        const gross = calcGross(record);
        const month = date.slice(0, 7);
        const year = date.slice(0, 4);
        monthly.set(month, (monthly.get(month) || 0) + gross);
        yearly.set(year, (yearly.get(year) || 0) + gross);
      });
      const months = Array.from(monthly.keys()).sort().slice(-12);
      const monthLabels = months.map(m => m.slice(2).replace("-", "/"));
      const monthValues = months.map(m => monthly.get(m));
      const years = Array.from(yearly.keys()).sort();
      drawBarChart("monthlyChart", monthLabels, monthValues, v => `${Math.round(v/10000).toLocaleString()}万`);
      drawBarChart("yearlyChart", years, years.map(y => yearly.get(y)), v => `${Math.round(v/10000).toLocaleString()}万`);
      const totalYears = years.length ? `${years[0]}〜${years[years.length - 1]}` : "年別";
      const note = document.getElementById("yearlyChartNote");
      if (note) note.textContent = totalYears;
    }

    function openNote(index) {
      activeNote.index = index;
      const record = currentRecord();
      const item = record.items[index];
      document.getElementById("noteText").value = item.remark || "";
      document.getElementById("noteModal").classList.add("open");
      setTimeout(() => document.getElementById("noteText").focus(), 0);
    }

    function closeNote() {
      document.getElementById("noteModal").classList.remove("open");
      activeNote.index = null;
    }

    function saveNote() {
      const record = currentRecord();
      const index = activeNote.index;
      if (!record || index === null || !record.items[index]) return;
      const text = document.getElementById("noteText").value.trim();
      record.items[index].remark = text;
      saveRecords();
      closeNote();
      renderRecord();
    }

    function insertTimestamp() {
      const textarea = document.getElementById("noteText");
      const prefix = `[${nowStamp()}] `;
      const start = textarea.selectionStart || 0;
      const end = textarea.selectionEnd || 0;
      textarea.value = textarea.value.slice(0, start) + prefix + textarea.value.slice(end);
      textarea.focus();
      textarea.selectionStart = textarea.selectionEnd = start + prefix.length;
    }

    document.addEventListener("input", event => {
      const target = event.target;
      const record = currentRecord();
      if (!record) return;
      if (target.matches("[data-field]")) {
        const field = target.dataset.field;
        record.fields[field] = dateFields.has(field) ? normalizeDate(target.value) : target.value;
        if (field === "customerName") record.sheetName = target.value || record.sheetName;
        saveRecords();
        renderRecordSelect();
        recalcView();
      }
      if (target.matches("[data-item-field]")) {
        const index = Number(target.dataset.item);
        const field = target.dataset.itemField;
        if (!record.items[index]) return;
        record.items[index][field] = field === "deliveryDate" ? normalizeDate(target.value) : target.value;
        saveRecords();
        recalcView();
      }
      if (target.matches("[data-purchase-field]")) {
        const field = target.dataset.purchaseField;
        record.purchase[field] = target.value;
        if (field === "method" && target.value === "現金販売") {
          record.purchase.company = "現金販売";
          record.purchase.rate = "-";
          record.purchase.times = "-";
          if (!num(record.purchase.baseAmount) && num(record.purchase.monthly)) record.purchase.baseAmount = record.purchase.monthly;
          saveRecords();
          renderRecord();
          return;
        }
        if (field === "method" && target.value === "リース") {
          record.purchase.company = record.purchase.company === "現金販売" ? "アプラス" : record.purchase.company;
          record.purchase.rate = record.purchase.rate === "-" ? "" : record.purchase.rate;
          record.purchase.times = record.purchase.times === "-" ? "84回" : record.purchase.times;
          saveRecords();
          renderRecord();
          return;
        }
        saveRecords();
        recalcView();
      }
    });

    document.addEventListener("change", event => {
      const target = event.target;
      const record = currentRecord();
      if (!record) return;
      if (target.matches("[data-field]")) {
        const field = target.dataset.field;
        record.fields[field] = dateFields.has(field) ? normalizeDate(target.value) : target.value;
        if (field === "leaseCompany") record.purchase.company = target.value;
        saveRecords();
        renderRecord();
      }
      if (target.matches("[data-item-field]")) {
        const index = Number(target.dataset.item);
        const field = target.dataset.itemField;
        record.items[index][field] = field === "deliveryDate" ? normalizeDate(target.value) : target.value;
        saveRecords();
        renderRecord();
      }
      if (target.matches("[data-purchase-field]")) {
        const field = target.dataset.purchaseField;
        record.purchase[field] = target.value;
        if (field === "company") record.fields.leaseCompany = target.value;
        if (field === "method" && target.value === "現金販売") {
          record.purchase.company = "現金販売";
          record.fields.leaseCompany = "現金販売";
          record.purchase.rate = "-";
          record.purchase.times = "-";
          if (!num(record.purchase.baseAmount) && num(record.purchase.monthly)) record.purchase.baseAmount = record.purchase.monthly;
        }
        if (field === "method" && target.value === "リース") {
          record.purchase.company = record.purchase.company === "現金販売" ? "アプラス" : record.purchase.company;
          record.fields.leaseCompany = record.purchase.company;
          record.purchase.rate = record.purchase.rate === "-" ? "" : record.purchase.rate;
          record.purchase.times = record.purchase.times === "-" ? "84回" : record.purchase.times;
        }
        saveRecords();
        renderRecord();
      }
      if (target.id === "basisDate") renderMetrics();
    });

    document.addEventListener("click", event => {
      const target = event.target;
      const record = currentRecord();
      if (target.id === "addItemBtn") {
        record.items.push(blankItem());
        saveRecords();
        renderRecord();
      }
      if (target.id === "printBtn") window.print();
      if (target.id === "resetSeedBtn") {
        if (!confirm("初期データを再読込します。現在の保存データは上書きされます。よろしいですか？")) return;
        records = normalizeRecords(deepCopy(SEED_RECORDS));
        currentIndex = 0;
        saveRecords();
        renderRecord();
      }
      if (target.matches("[data-delete-item]")) {
        const index = Number(target.dataset.deleteItem);
        if (!confirm("この明細行を削除しますか？")) return;
        record.items.splice(index, 1);
        if (!record.items.length) record.items.push(blankItem());
        saveRecords();
        renderRecord();
      }
      if (target.matches("[data-note-item]")) {
        openNote(Number(target.dataset.noteItem));
      }
    });

    document.getElementById("recordSearch").addEventListener("input", () => { renderRecordSelect(); renderRecord(); });
    document.getElementById("statusQuickFilter").addEventListener("change", () => { renderRecordSelect(); renderRecord(); });
    document.getElementById("recordSelect").addEventListener("change", event => { currentIndex = Number(event.target.value); renderRecord(); });

    document.getElementById("newRecordBtn").addEventListener("click", () => {
      records.push(createBlankRecord());
      currentIndex = records.length - 1;
      saveRecords();
      renderRecord();
    });

    document.getElementById("duplicateBtn").addEventListener("click", () => {
      const copy = deepCopy(currentRecord());
      copy.id = "rec_" + Date.now();
      copy.fields.customerName = (copy.fields.customerName || copy.sheetName || "案件") + " コピー";
      copy.sheetName = copy.fields.customerName;
      records.push(copy);
      currentIndex = records.length - 1;
      saveRecords();
      renderRecord();
    });

    document.getElementById("deleteRecordBtn").addEventListener("click", () => {
      const record = currentRecord();
      if (!record) return;
      if (!confirm(`${record.fields.customerName || record.sheetName} を削除しますか？`)) return;
      records.splice(currentIndex, 1);
      currentIndex = Math.max(0, currentIndex - 1);
      saveRecords();
      renderRecord();
    });

    document.getElementById("csvBtn").addEventListener("click", () => {
      const headers = ["屋号","商流","申込日","検収日","工事予定日","進捗ステータス","リース会社","購入方法","月額税別","料率","回数","月額/料率%","仕切り合計","粗利","明細種別","商材","メーカー/外注先","仕入れ先","型番","個数","仕切り単価","納期予定日","納品状況","備考"];
      const rows = [];
      records.forEach(record => {
        (record.items || [blankItem()]).forEach(item => {
          rows.push([record.fields.customerName, record.fields.route, record.fields.applicationDate, record.fields.inspectionDate, record.fields.constructionDate, record.fields.progressStatus, record.fields.leaseCompany, record.purchase.method, record.purchase.monthly, record.purchase.rate, record.purchase.times, calcBaseAmount(record), calcItemTotal(record), calcGross(record), item.type, item.product, item.maker, item.supplier, item.model, item.qty, item.unitCost, item.deliveryDate, item.deliveryStatus, item.remark]);
        });
      });
      const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell ?? "").replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `受注顧客管理_${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });

    document.getElementById("noteCloseBtn").addEventListener("click", closeNote);
    document.getElementById("noteSaveBtn").addEventListener("click", saveNote);
    document.getElementById("noteTimestampBtn").addEventListener("click", insertTimestamp);
    document.getElementById("noteModal").addEventListener("click", event => { if (event.target.id === "noteModal") closeNote(); });

    window.addEventListener("beforeunload", () => {
      if (cloudReady && !applyingRemote) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }
    });

    setupFilters();
    renderRecord();
    setupAuthEvents();
    initAuthGate();
  </script>
</body>
</html>
